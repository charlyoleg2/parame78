04 161.817)scale(.26458)"><tspan x="67.107" y="406.965">A</tspan></text><text xml:space="preserve" style="font-size:16px;line-height:normal;font-family:&quot;Liberation Mono&quot;;-inkscape-font-specification:&quot;Liberation Mono&quot;;text-decoration-color:#000;white-space:pre;shape-inside:url(#d);display:inline;fill:#000;stroke-width:1;-inkscape-stroke:none;stop-color:#000" transform="translate(54.073 146.684)scale(.26458)"><tspan x="256.99" y="443.57">B</tspan></text><path d="m53.728 231.967 58.396 13.243" style="fill:none;stroke:red;stroke-width:.264583;stroke-linejoin:round;stroke-dasharray:none;marker-start:url(#b);marker-end:url(#b)"/><path d="M82.926 238.589h31.792" style="fill:none;stroke:#b3b3b3;stroke-width:.264583;stroke-linejoin:round;stroke-dasharray:none"/><path d="M28.247 265.12s.595-3.312-.201-4.64c-.884-1.474-4.44-2.623-4.44-2.623" style="fill:none;stroke:#4a0;stroke-width:.264583;stroke-linejoin:round;stroke-dasharray:none;marker-end:url(#b)"/><text xml:space="preserve" style="font-size:16px;line-height:normal;font-family:&quot;Liberation Mono&quot;;-inkscape-font-specification:&quot;Liberation Mono&quot;;text-decoration-color:#000;white-space:pre;shape-inside:url(#e);display:inline;fill:#4a0;stroke-width:1;-inkscape-stroke:none;stop-color:#000" transform="translate(-19.545 172.46)scale(.26458)"><tspan x="179.969" y="328.42">a</tspan></text><path d="M133.968 265.513s.542 3.447-.213 4.895c-.701 1.347-3.615 2.767-3.615 2.767" style="fill:none;stroke:#4a0;stroke-width:.264583;stroke-linejoin:round;stroke-dasharray:none;marker-end:url(#b)"/><path d="M104.858 238.819s.236 1.832-.093 2.602c-.307.716-1.58 1.47-1.58 1.47" style="fill:none;stroke:#4a0;stroke-width:.264583;stroke-linejoin:round;stroke-dasharray:none;marker-end:url(#f)"/><text xml:space="preserve" style="font-size:16px;line-height:normal;font-family:&quot;Liberation Mono&quot;;-inkscape-font-specification:&quot;Liberation Mono&quot;;text-decoration-color:#000;white-space:pre;shape-inside:url(#g);display:inline;fill:#4a0;stroke-width:1;-inkscape-stroke:none;stop-color:#000" transform="translate(50.845 151.123)scale(.26458)"><tspan x="317.996" y="456.533">b</tspan></text><text xml:space="preserve" style="font-size:16px;line-height:normal;font-family:&quot;Liberation Mono&quot;;-inkscape-font-specification:&quot;Liberation Mono&quot;;text-decoration-color:#000;white-space:pre;shape-inside:url(#h);display:inline;fill:#4a0;stroke-width:1;-inkscape-stroke:none;stop-color:#000" transform="translate(-14.93 181.791)scale(.26458)"><tspan x="455.262" y="230.809">c</tspan></text><text xml:space="preserve" style="font-size:16px;line-height:normal;font-family:&quot;Liberation Mono&quot;;-inkscape-font-specification:&quot;Liberation Mono&quot;;text-decoration-color:#000;white-space:pre;shape-inside:url(#i);display:inline;fill:#000;stroke-width:1;-inkscape-stroke:none;stop-color:#000" transform="translate(-9.483 194.704)scale(.26458)"><tspan x="349.262" y="157.602">C</tspan></text><text xml:space="preserve" style="font-size:16px;line-height:normal;font-family:&quot;Liberation Mono&quot;;-inkscape-font-specification:&quot;Liberation Mono&quot;;text-decoration-color:#000;white-space:pre;shape-inside:url(#j);display:inline;fill:#000;stroke-width:1;-inkscape-stroke:none;stop-color:#000" transform="translate(-12.711 -21.494)scale(.26458)"><tspan x="68.633" y="482.461">Problem:
</tspan><tspan x="68.633" y="502.461">A,B two points on an horizontal axis
</tspan><tspan x="68.633" y="522.461">lAB: distance between A and B
</tspan><tspan x="68.633" y="542.461">a: angle of the tangent at A
</tspan><tspan x="68.633" y="562.461">b: angle of the tangent at B
</tspan><tspan x="68.633" y="582.461">c: angle of the tangent at C
</tspan><tspan x="68.633" y="602.461">Notice that the position of C is not defined yet
</tspan><tspan x="68.633" y="622.461">Find an arc-of-circle AC respecting the tangents in A and C
</tspan><tspan x="68.633" y="642.461">and an arc-of-circle CB respecting the tangents in C and B?
</tspan><tspan x="68.633" y="662.461">Where should be located C to enable those 2 arc-of-circles?</tspan></text><text xml:space="preserve" style="font-size:16px;line-height:normal;font-family:&quot;Liberation Mono&quot;;-inkscape-font-specification:&quot;Liberation Mono&quot;;text-decoration-color:#000;white-space:pre;shape-inside:url(#k);display:inline;fill:#000;stroke-width:1;-inkscape-stroke:none;stop-color:#000" transform="translate(2.421 155.859)scale(.26458)"><tspan x="17.539" y="705.135">Solution:
</tspan><tspan x="17.539" y="725.135">The arc AC has its center in E because of the tangents.
</tspan><tspan x="17.539" y="745.135">The triangle AEC must also be isoscel in E
</tspan><tspan x="17.539" y="765.135">Find u=aBAC, so AEC is isocel.
</tspan><tspan x="17.539" y="785.135">aEAD = Pi/2-a
</tspan><tspan x="17.539" y="805.135">aADE = Pi/2-c
</tspan><tspan x="17.539" y="825.135">aDEA = Pi - aEAD - aADE = a+c = aCEA
</tspan><tspan x="17.539" y="845.135">aEAC = aACE = (Pi - aCEA)/2 = (Pi - a - c)/2
</tspan><tspan x="17.539" y="865.135">u = aEAC - aEAD = (Pi-a-c)/2 - (Pi/2-a) = (a-c)/2
</tspan><tspan x="17.539" y="885.135">The arc CB has its center in F because of the tangents.
</tspan><tspan x="17.539" y="905.135">The triangle BFC must also be isoscel in F
</tspan><tspan x="17.539" y="925.135">Find v=aABC, so BFC is isocel.
</tspan><tspan x="17.539" y="945.135">aDBF = Pi/2 - b
</tspan><tspan x="17.539" y="965.135">aFDB = Pi/2 + c
</tspan><tspan x="17.539" y="985.135">aBFD = Pi - aDBF - aFDB = b-c = aBFC
</tspan><tspan x="17.539" y="1005.135">aCBF = aFCB = (Pi - aBFC)/2 = (Pi - b + c)/2
</tspan><tspan x="17.539" y="1025.135">v = aCBF - aDBF = (Pi-b+c)/2 - (Pi/2-b) = (b+c)/2</tspan></text><path d="m62.774 327.069 20.117-88.497" style="fill:#ffd5d5;stroke:#ffd5d5;stroke-width:.264583;stroke-linejoin:round;stroke-dasharray:none"/><path d="m18.715 265.388 86.34 49.697" style="fill:none;stroke:#acf;stroke-width:.264583;stroke-linejoin:round;stroke-dasharray:none"/><path d="m47.992 328.71 74.682-63.387" style="fill:none;stroke:#80b3ff;stroke-width:.264583;stroke-linejoin:round;stroke-dasharray:none"/><path d="m18.745 265.293 108.175-45.176" style="fill:#ffd5d5;stroke:#eaf;stroke-width:.264583;stroke-linejoin:round;stroke-dasharray:none"/><path d="m122.686 265.308-74.71-50.172" style="fill:#ffd5d5;stroke:#eaf;stroke-width:.264584;stroke-linejoin:round;stroke-dasharray:none"/><path d="M39.546 265.323s.972-2.81.807-4.237c-.152-1.316-1.614-3.632-1.614-3.632" style="fill:none;stroke:#c0f;stroke-width:.264583;stroke-linejoin:round;stroke-dasharray:none;marker-end:url(#b)"/><text xml:space="preserve" style="font-size:16px;line-height:normal;font-family:&quot;Liberation Mono&quot;;-inkscape-font-specification:&quot;Liberation Mono&quot;;text-decoration-color:#000;white-space:pre;shape-inside:url(#l);display:inline;fill:#c0f;stroke-width:1;-inkscape-stroke:none;stop-color:#000" transform="translate(-12.51 165.448)scale(.26458)"><tspan x="203.609" y="365.024">u</tspan></text><path d="M111.375 265.12s-.993-2.54-.807-3.833c.142-.982 1.412-2.623 1.412-2.623" style="fill:none;stroke:#c0f;stroke-width:.264583;stroke-linejoin:round;stroke-dasharray:none;marker-end:url(#b)"/><text xml:space="preserve" style="font-size:16px;line-height:normal;font-family:&quot;Liberation Mono&quot;;-inkscape-font-specification:&quot;Liberation Mono&quot;;text-decoration-color:#000;white-space:pre;shape-inside:url(#m);display:inline;fill:#c0f;stroke-width:1;-inkscape-stroke:none;stop-color:#000" transform="translate(53.087 165.688)scale(.26458)"><tspan x="203.609" y="365.024">v</tspan></te